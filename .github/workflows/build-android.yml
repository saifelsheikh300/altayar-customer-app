name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm install

      - name: Add Android platform
        run: npx cap add android

      - name: Generate app icon from resources/icon.png
        run: npx capacitor-assets generate --android --iconBackgroundColor '#FD5003' --iconBackgroundColorDark '#111111' --splashBackgroundColor '#FD5003' --splashBackgroundColorDark '#FD5003'

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Add custom animated splash logo
        run: |
          mkdir -p android/app/src/main/res/drawable
          cp native-patch/altayar_splash_logo.png android/app/src/main/res/drawable/altayar_splash_logo.png

      - name: Fix Android 12+ system splash (orange instead of black square)
        run: python3 native-patch/patch_splash_theme.py

      - name: Add custom animated splash screen (MainActivity)
        run: cp native-patch/MainActivity.java android/app/src/main/java/com/altayar/customer/MainActivity.java

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: cd android && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: altayar-customer-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
